data:
  raw_dir: "data/raw"
  output_dir: "outputs"

targets:
  - fr_spot
  - uk_spot

validation:
  strategy: "holdout"
  holdout_start: "2024-02-01"
  n_splits: 3

models:
  catboost:
    loss_function: "RMSE"
    eval_metric: "RMSE"
    iterations: 5000
    learning_rate: 0.03
    depth: 8
    l2_leaf_reg: 5
    subsample: 0.8
    early_stopping_rounds: 100
    random_seed: 42
    optuna_trials: 80

  lightgbm:
    objective: "regression_l1"
    metric: "rmse"
    n_estimators: 3000
    learning_rate: 0.05
    num_leaves: 63
    feature_fraction: 0.7
    bagging_fraction: 0.8
    bagging_freq: 5
    min_child_samples: 20
    early_stopping_rounds: 100

ensemble:
  method: "ridge"
  alpha_search: [0.01, 0.1, 1.0, 10.0, 100.0]

postprocessing:
  clip_lower_quantile: 0.001
  clip_upper_quantile: 0.999
  hourly_bias_correction: true

feature_engineering:
  daily_cols:
    - de_gas
    - es_gas
    - fr_gas
    - nl_gas
    - uk_gas
    - eu_emission
    - uk_emission
  gas_efficiency: 0.50
  emission_factor: 0.37
  river_hot_threshold_fr: 25.0
  river_hot_threshold_de: 23.0
  nuclear_low_threshold: 35000
  nuclear_very_low_threshold: 25000
  uk_wind_high_threshold: 0.50
  uk_wind_very_high_threshold: 0.65
  scarcity_critical_threshold: 0.85
  scarcity_extreme_threshold: 0.95
  jump_threshold: 50.0
  ocgt_efficiency: 0.40
  ccgt_efficiency: 0.55
  nuclear_marginal_cost: 12.0
  transport_cost_approx: 2.0
  scarcity_barrier_power: 1.5
