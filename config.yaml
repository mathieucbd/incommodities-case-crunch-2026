# ==========================================
# InCommodities Case Crunch 2026 - Master Config
# ==========================================

# 1. DATA PATHS
# ------------------------------------------
data:
  # -> FOR SIMULATION: Use the AUHack data
  raw_dir: "data/raw/auhack_legacy/" 
  # -> FOR REAL COMPETITION: Uncomment below
  # raw_dir: "data/raw/case_provided/"
  processed_dir: "data/processed/"
  output_dir: "data/outputs/"
  catboost_logs: "data/outputs/catboost_info/"

# 2. PIPELINE TOGGLES
# ------------------------------------------
pipeline:
  global_seed: 42
  run_data_ingestion: true
  run_preprocessing: true
  run_lear_baseline: true
  run_tree_models: true
  run_dnn_multivariate: true
  run_qra_ensemble: true
  run_shap_explainability: true

# 3. MODEL HYPERPARAMETERS & SETTINGS
# ------------------------------------------
model_settings:
  # LEAR settings
  lear:
    calibration_window_days: 182 

  # Tree Models (TPE Optimized)
  trees:
    lgb:
      n_estimators: 500
      learning_rate: 0.00969
      num_leaves: 54
    xgb:
      n_estimators: 1000
      learning_rate: 0.01098
      max_depth: 8
      subsample: 0.7927
    cat:
      n_estimators: 1000
      learning_rate: 0.06476
      depth: 6
    rf:
      n_estimators: 500
      max_depth: 20
      min_samples_split: 8
    early_stopping_rounds: 50

  # Deep Neural Network (PyTorch Multivariate - TPE Optimized)
  dnn:
    epochs: 150
    batch_size: 64
    validation_split: 0.2
    learning_rate: 0.00952
    dropout_rate: 0.312
    patience: 15
    use_data_augmentation: true

  # Quantile Regression Averaging (QRA) Ensemble
  qra:
    quantiles: [0.05, 0.50, 0.95]
    alpha_winkler: 0.10

  # Hyperopt Settings
  hyperopt:
    max_evals: 50
    trials_dir: "data/outputs/trials/"

# 4. MARKET INTEGRATION (GREEDY ALGORITHM)
# ------------------------------------------
zones:
  target_zones: ["AT", "BE", "CH", "CZ", "DE", "DK1", "DK2", "FR", "NL", "NO2", "PL", "SE4"]